 version: '3.8'
 
 services:
   mysql:
     image: mysql:8.0
     container_name: shop-mysql
     restart: unless-stopped
     environment:
       MYSQL_ROOT_PASSWORD: 123456
       MYSQL_DATABASE: shop
     ports:
       - "3306:3306"
     volumes:
       - mysql_data:/var/lib/mysql
       - ./校园小卖部/code2026.sql:/docker-entrypoint-initdb.d/01-init.sql
       - ./校园小卖部/code2026/update_passwords.sql:/docker-entrypoint-initdb.d/02-update-passwords.sql
     healthcheck:
       test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
       interval: 10s
       timeout: 5s
       retries: 5
 
   redis:
     image: redis:7-alpine
     container_name: shop-redis
     restart: unless-stopped
     ports:
       - "6379:6379"
 
   backend:
     build:
       context: .
       dockerfile: docker/backend.Dockerfile
     container_name: shop-backend
     restart: unless-stopped
     ports:
       - "9090:9090"
     depends_on:
       mysql:
         condition: service_healthy
       redis:
         condition: service_started
     environment:
       SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/shop?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2b8&allowPublicKeyRetrieval=true
       SPRING_DATASOURCE_USERNAME: root
       SPRING_DATASOURCE_PASSWORD: 123456
       SPRING_DATA_REDIS_HOST: redis
       FILE_BASE_URL: http://localhost
 
   frontend:
     build:
       context: .
       dockerfile: docker/frontend.Dockerfile
     container_name: shop-frontend
     restart: unless-stopped
     ports:
       - "80:80"
     depends_on:
       - backend
 
 volumes:
   mysql_data:
